<div class="chatbot-container">
    <div class="chatbot-header">
        <div class="header-content">
            <h1>🤖 Travel Assistant</h1>
            <p>Ask me anything about travel planning!</p>
        </div>
    </div>

    <div class="chat-messages">
        <div *ngFor="let message of messages"
            [ngClass]="{'user-message': message.isUser, 'bot-message': !message.isUser}" class="message">
            <div class="message-bubble">
                {{ message.text }}
            </div>
            <span class="message-time">{{ message.timestamp | date: 'HH:mm' }}</span>
        </div>

        <div *ngIf="loading" class="message bot-message">
            <div class="message-bubble typing">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="chat-input-section">
        <div class="input-wrapper">
            <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
                placeholder="Ask me about destinations, hotels, safety, food..." class="chat-input">
            <button (click)="sendMessage()" class="send-btn">Send</button>
        </div>
        <button (click)="clearChat()" class="clear-btn">Clear Chat</button>
    </div>

    <div class="quick-suggestions">
        <p>Quick suggestions:</p>
        <button (click)="userInput='help'; sendMessage()" class="suggestion-btn">Help</button>
        <button (click)="userInput='destinations'; sendMessage()" class="suggestion-btn">Destinations</button>
        <button (click)="userInput='hotels'; sendMessage()" class="suggestion-btn">Hotels</button>
        <button (click)="userInput='safety'; sendMessage()" class="suggestion-btn">Safety</button>
        <button (click)="userInput='food'; sendMessage()" class="suggestion-btn">Food</button>
    </div>
</div>
